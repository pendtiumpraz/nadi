<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Development — NADI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #8B1C1C;
    --dark: #1A1A1A;
    --muted: #888;
    --line: #E8E5E1;
    --bg: #FAFAF8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; color: var(--dark); background: var(--bg); display: flex; flex-direction: column; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6%; height: 64px;
    background: rgba(250,250,248,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .logo { text-decoration: none; display: flex; align-items: baseline; gap: 10px; }
  .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; color: var(--dark); letter-spacing: 0.15em; }
  .logo-by { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.04em; }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 64px 6% 0; text-align: center;
  }
  .content { max-width: 520px; }

  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--crimson); margin-bottom: 2rem;
  }
  .status::before, .status::after { content: ''; width: 20px; height: 1px; background: var(--crimson); }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 300; line-height: 1.1; color: var(--dark);
    margin-bottom: 1.5rem;
  }
  h1 em { font-style: italic; color: var(--crimson); }

  p {
    font-size: 1rem; line-height: 1.9; color: var(--muted);
    font-weight: 300; margin-bottom: 2.5rem;
  }

  .btn-back {
    display: inline-block; padding: 12px 30px;
    border: 1px solid var(--line); color: var(--dark);
    text-decoration: none; font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase; border-radius: 1px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-back:hover { border-color: var(--crimson); color: var(--crimson); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .content > * { animation: fadeUp 0.8s ease both; }
  .content > *:nth-child(1) { animation-delay: 0.1s; }
  .content > *:nth-child(2) { animation-delay: 0.25s; }
  .content > *:nth-child(3) { animation-delay: 0.4s; }
  .content > *:nth-child(4) { animation-delay: 0.55s; }
</style>
</head>
<body>

<nav>
  <a href="nadi_2.html" class="logo">
    <span class="logo-name">NADI</span>
    <span class="logo-by">advancing development &amp; innovation</span>
  </a>
</nav>

<main>
  <div class="content">
    <p class="status">Under Development</p>
    <h1>Something is <em>coming</em></h1>
    <p>This page is currently being built. We are working on it and will have it ready soon. In the meantime, feel free to get in touch.</p>
    <a href="nadi_2.html" class="btn-back">← Back to Home</a>
  </div>
</main>

</body>
</html>
